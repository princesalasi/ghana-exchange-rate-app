name: Deploy Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Update Bank of Ghana rates
        run: |
          python3 <<'PY'
          import json
          import re
          from datetime import datetime, timezone
          import requests
          from bs4 import BeautifulSoup

          url = "https://www.bog.gov.gh/treasury-and-the-markets/daily-interbank-fx-rates/"
          response = requests.get(
              url,
              headers={"User-Agent": "Mozilla/5.0"},
              timeout=30
          )
          response.raise_for_status()

          soup = BeautifulSoup(response.text, "html.parser")
          text = soup.get_text("\n", strip=True)
          lines = [line.strip() for line in text.splitlines() if line.strip()]

          supported = {
              "US Dollar": "USD",
              "Euro": "EUR",
              "Pound Sterling": "GBP",
              "Yuan Renminbi": "CNY",
              "Naira": "NGN"
          }

          rates = {"GHS": 1}
          page_date = None
          date_pattern = re.compile(r"^\d{1,2}\s+[A-Za-z]{3}\s+\d{4}$")
          number_pattern = re.compile(r"^\d[\d,]*\.\d+$")

          i = 0
          while i < len(lines):
              line = lines[i]

              if page_date is None and date_pattern.match(line):
                  page_date = line

              if line in supported and i + 4 < len(lines):
                  pair = lines[i + 1]
                  selling = lines[i + 3]

                  if number_pattern.match(selling):
                      value = float(selling.replace(",", ""))
                      code = supported[line]

                      if pair == f"{code}GHS":
                          rates[code] = value
                      elif pair == f"GHS{code}":
                          rates[code] = 1 / value

                  i += 5
              else:
                  i += 1

          if len(rates) == 1:
              raise RuntimeError("No exchange rates were extracted from the Bank of Ghana page.")

          data = {
              "source": "Bank of Ghana Daily Interbank FX Rates",
              "rate_type": "selling",
              "source_page_date": page_date,
              "updated_at": datetime.now(timezone.utc).isoformat(),
              "rates": rates
          }

          with open("rates.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
          PY

      - name: Prepare site folder
        run: |
          mkdir -p site
          cp index.html site/
          cp style.css site/
          cp script.js site/
          cp rates.json site/
          cp manifest.json site/ || true
          cp service-worker.js site/ || true
          cp boglogonew.png site/ || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
