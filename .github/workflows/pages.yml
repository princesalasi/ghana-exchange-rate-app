name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml certifi

      - name: Download latest Bank of Ghana rates
        run: |
          python <<'PY'

          import json
          import re
          from datetime import datetime, timezone

          import requests
          from bs4 import BeautifulSoup
          import urllib3

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          URL = "https://www.bog.gov.gh/treasury-and-the-markets/daily-interbank-fx-rates/"

          response = requests.get(
              URL,
              headers={
                  "User-Agent":"Mozilla/5.0"
              },
              timeout=30,
              verify=False
          )

          response.raise_for_status()

          soup = BeautifulSoup(response.text,"html.parser")

          text = soup.get_text("\n",strip=True)

          lines=[l.strip() for l in text.splitlines() if l.strip()]

          currencies={
              "US Dollar":"USD",
              "Euro":"EUR",
              "Pound Sterling":"GBP",
              "Yuan Renminbi":"CNY",
              "Naira":"NGN"
          }

          buying={
              "GHS":1
          }

          selling={
              "GHS":1
          }

          page_date=None

          date_pattern=re.compile(r"^\d{1,2}\s+[A-Za-z]{3}\s+\d{4}$")

          number_pattern=re.compile(r"^\d[\d,]*\.\d+$")

          i=0

          while i < len(lines):

              line=lines[i]

              if page_date is None and date_pattern.match(line):
                  page_date=line

              if line in currencies and i+4 < len(lines):

                  pair=lines[i+1]

                  buying_rate=lines[i+2]

                  selling_rate=lines[i+3]

                  code=currencies[line]

                  if (
                      number_pattern.match(buying_rate)
                      and
                      number_pattern.match(selling_rate)
                  ):

                      buy=float(buying_rate.replace(",",""))
                      sell=float(selling_rate.replace(",",""))

                      if pair==f"{code}GHS":

                          buying[code]=buy
                          selling[code]=sell

                      elif pair==f"GHS{code}":

                          buying[code]=1/buy
                          selling[code]=1/sell

                  i+=5

              else:
                  i+=1

          if len(selling)==1:
              raise RuntimeError("No exchange rates extracted.")

          data={

              "source":"Bank of Ghana Daily Interbank FX Rates",

              "source_page_date":page_date,

              "updated_at":datetime.now(timezone.utc).isoformat(),

              "buying":buying,

              "selling":selling

          }

          with open("rates.json","w",encoding="utf-8") as f:
              json.dump(data,f,indent=2)

          print(json.dumps(data,indent=2))

          PY

      - name: Prepare site
        run: |
          rm -rf site
          mkdir site

          cp index.html site/
          cp style.css site/
          cp script.js site/
          cp rates.json site/

          if [ -f manifest.json ]; then
            cp manifest.json site/
          fi

          if [ -f service-worker.js ]; then
            cp service-worker.js site/
          fi

          if [ -f boglogonew.png ]; then
            cp boglogonew.png site/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
