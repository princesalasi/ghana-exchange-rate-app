<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ghana Exchange Rates</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>

<body>
  <div class="container">
    <h1>Exchange Rate Converter</h1>
    <p id="lastUpdated">Loading rates...</p>

    <div class="grid">
      <input id="GHS" placeholder="GHS" />
      <input id="USD" placeholder="USD" />
      <input id="EUR" placeholder="EUR" />
      <input id="GBP" placeholder="GBP" />
      <input id="CNY" placeholder="CNY" />
      <input id="NGN" placeholder="NGN" />
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
