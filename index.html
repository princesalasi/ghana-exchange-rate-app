<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Ghana Exchange Rates</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>Ghana Exchange Rates</h1>
    <div id="lastUpdated">Loading latest rates...</div>

    <section class="grid" aria-label="Currency converter">
      <label class="input-row" for="GHS">
        <span class="currency">GHS</span>
        <input id="GHS" type="number" inputmode="decimal" placeholder="0" />
      </label>

      <label class="input-row" for="USD">
        <span class="currency">USD</span>
        <input id="USD" type="number" inputmode="decimal" placeholder="0" />
      </label>

      <label class="input-row" for="EUR">
        <span class="currency">EUR</span>
        <input id="EUR" type="number" inputmode="decimal" placeholder="0" />
      </label>

      <label class="input-row" for="GBP">
        <span class="currency">GBP</span>
        <input id="GBP" type="number" inputmode="decimal" placeholder="0" />
      </label>

      <label class="input-row" for="CNY">
        <span class="currency">CNY</span>
        <input id="CNY" type="number" inputmode="decimal" placeholder="0" />
      </label>

      <label class="input-row" for="NGN">
        <span class="currency">NGN</span>
        <input id="NGN" type="number" inputmode="decimal" placeholder="0" />
      </label>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
