name: Update Bank of Ghana Rates

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape Bank of Ghana FX rates
        run: |
          python3 <<'PY'
          import json
          from datetime import date
          import requests
          from bs4 import BeautifulSoup

          url = "https://www.bog.gov.gh/treasury-and-the-markets/historical-interbank-fx-rates/"
          response = requests.get(url, timeout=30)
          response.raise_for_status()

          soup = BeautifulSoup(response.text, "html.parser")
          rates = {"GHS": 1}

          mapping = {
              "US Dollar": "USD",
              "Euro": "EUR",
              "Pound Sterling": "GBP",
              "Yuan Renminbi": "CNY",
              "Naira": "NGN"
          }

          for row in soup.select("table tbody tr"):
              cols = row.find_all("td")
              if len(cols) < 6:
                  continue

              currency = cols[1].get_text(strip=True)
              mid_rate = cols[5].get_text(strip=True)

              try:
                  rate = float(mid_rate.replace(",", ""))
              except ValueError:
                  continue

              if currency in mapping:
                  rates[mapping[currency]] = rate

          data = {
              "date": str(date.today()),
              "rates": rates
          }

          with open("rates.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)

          print("Updated rates:", data)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rates.json
          git commit -m "Auto update BoG rates" || exit 0
          git push